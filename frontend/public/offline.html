<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You\'re Offline - Study Planner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: system-ui, sans-serif;
      color: #442130;
      background: radial-gradient(circle at top, #fff7fb 0%, #f3ece8 55%, #ece4de 100%);
      text-align: center;
    }
    .card {
      width: min(420px, 100%);
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: 0 20px 50px rgba(107, 28, 62, 0.14);
    }
    .icon { font-size: 60px; margin-bottom: 18px; }
    h1 { color: #6B1C3E; font-size: 28px; margin-bottom: 12px; }
    p { color: #6d5b63; line-height: 1.7; }
    button {
      margin-top: 28px;
      border: none;
      border-radius: 999px;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: #6B1C3E;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">??</div>
    <h1>You\'re Offline</h1>
    <p>No internet connection detected. Cached pages may still be available while Study Planner waits for you to reconnect.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
